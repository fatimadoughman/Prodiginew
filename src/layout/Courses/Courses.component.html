<section class="courses-page">
<div class="courses-header">
  <span class="section-tag">COURSES & TRAINING</span>

  <h1>Professional learning paths for ambitious students</h1>


</div>
<div class="explore-link" (click)="openCourse(courses)">
        Explore More →
      </div>

<div class="courses-grid">
  @for (course of courses; track course.title) {
    <div class="course-card" (click)="openCourse(course)">

      <div class="course-icon">{{ course.icon }}</div>

      <span class="course-category">{{ course.category }}</span>

      <h3>{{ course.title }}</h3>

      <p>{{ course.description }}</p>

      <div class="course-info">
        <span>{{ course.duration }}</span>
        <strong>{{ course.price }}</strong>
      </div>

  <button>Enroll Now</button>

    </div>
  }
</div>
</section>
